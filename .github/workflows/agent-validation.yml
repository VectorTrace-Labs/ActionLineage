name: agent-validation-lab

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 7 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  no-model-replay:
    name: No-model scenario validation and replay (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'schedule' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: python -m pip install "uv==$(cat .github/uv-version.txt)"
      - name: Sync eval dependencies
        run: uv sync --locked --all-extras --group eval
      - name: Validate scenario DSL and coverage map
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals validate-scenarios
          uv run --group eval python -m actionlineage_evals lint-scenarios
          uv run --group eval python -m actionlineage_evals coverage --strict
          uv run --group eval python -m actionlineage_evals check-boundaries
      - name: Run no-model scripted eval suite
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals run \
            --scenario-path evals/scenarios \
            --artifact-root build/evals/no-model \
            --mode scripted \
            --model-adapter scripted \
            --seeds 1
      - name: Run Inspect no-model smoke
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals inspect-run \
            --scenario-path evals/scenarios/AVL-001.yaml \
            --artifact-root build/evals/inspect-smoke \
            --mode scripted \
            --model-adapter scripted \
            --seed 0
      - name: Replay first captured bundle
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals replay \
            build/evals/no-model/avl-001-scripted-seed-0/replay-bundle \
            --artifact-root build/evals/no-model-replay
      - name: Replay reviewed regression corpus
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals replay-regressions \
            --regression-dir evals/regressions \
            --artifact-root build/evals/regression-replay
      - name: Audit no-model eval artifacts for redaction leaks
        env:
          PYTHONPATH: evals
        run: uv run --group eval python -m actionlineage_evals audit-artifacts build/evals
      - name: Generate no-model public report artifact
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals public-report \
            build/evals/no-model \
            --json-output build/evals/reports/agent-validation-baseline.json \
            --markdown-output build/evals/reports/agent-validation-baseline.md
      - name: Generate no-model trend report
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals trend \
            build/evals/no-model \
            --output build/evals/reports/agent-validation-trend.json \
            --markdown-output build/evals/reports/agent-validation-trend.md \
            --label "no-model-py${{ matrix.python-version }}"
      - name: Check committed public baseline freshness
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals check-public-baseline \
            build/evals/no-model
      - name: Summarize no-model eval artifacts
        if: always()
        env:
          PYTHONPATH: evals
        run: |
          {
            echo "### No-model Agent Validation Lab scorecards"
            echo
            uv run --group eval python -m actionlineage_evals summarize build/evals --format markdown || true
            echo
            cat build/evals/reports/agent-validation-trend.md 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload no-model eval artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: actionlineage-agent-validation-no-model-py${{ matrix.python-version }}
          path: build/evals
          if-no-files-found: ignore
          retention-days: 14

  docker-smoke:
    name: Docker environment smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: python -m pip install "uv==$(cat .github/uv-version.txt)"
      - name: Sync eval dependencies
        run: uv sync --locked --all-extras --group eval
      - name: Start and tear down disposable Compose environment
        env:
          PYTHONPATH: evals
        run: uv run --group eval python -m actionlineage_evals docker-smoke
      - name: Run Docker-backed eval scenarios
        env:
          PYTHONPATH: evals
        run: |
          for scenario in AVL-001 AVL-002 AVL-003 AVL-004 AVL-005 AVL-014 AVL-015; do
            lower="$(printf '%s' "$scenario" | tr '[:upper:]' '[:lower:]')"
            uv run --group eval python -m actionlineage_evals run \
              --scenario-path "evals/scenarios/${scenario}.yaml" \
              --artifact-root "build/evals/docker-${lower}" \
              --mode scripted \
              --model-adapter scripted \
              --seeds 1 \
              --use-docker
          done
      - name: Audit Docker eval artifacts for redaction leaks
        env:
          PYTHONPATH: evals
        run: uv run --group eval python -m actionlineage_evals audit-artifacts build/evals
      - name: Generate Docker trend report
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals trend \
            build/evals \
            --output build/evals/reports/docker-agent-validation-trend.json \
            --markdown-output build/evals/reports/docker-agent-validation-trend.md \
            --label "docker-py${{ matrix.python-version }}"
      - name: Summarize Docker eval artifacts
        if: always()
        env:
          PYTHONPATH: evals
        run: |
          {
            echo "### Docker Agent Validation Lab scorecards"
            echo
            uv run --group eval python -m actionlineage_evals summarize build/evals --format markdown || true
            echo
            cat build/evals/reports/docker-agent-validation-trend.md 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Docker eval artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: actionlineage-agent-validation-docker-py${{ matrix.python-version }}
          path: build/evals
          if-no-files-found: ignore
          retention-days: 14

  scheduled-github-models:
    name: Scheduled GitHub Models agent run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    continue-on-error: true
    permissions:
      contents: read
      models: read
    steps:
      - name: Check explicit live-model secret
        id: live-secret
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          if [ -n "$GH_MODELS_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Scheduled live-model Agent Validation Lab"
              echo
              echo "Skipped: GH_MODELS_TOKEN is not configured; no model requests were made."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        if: steps.live-secret.outputs.configured == 'true'
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        if: steps.live-secret.outputs.configured == 'true'
        with:
          python-version: "3.12"
      - name: Install uv
        if: steps.live-secret.outputs.configured == 'true'
        run: python -m pip install "uv==$(cat .github/uv-version.txt)"
      - name: Sync eval dependencies
        if: steps.live-secret.outputs.configured == 'true'
        run: uv sync --locked --all-extras --group eval
      - name: Run bounded scheduled model evals
        if: steps.live-secret.outputs.configured == 'true'
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals inspect-run \
            --scenario-path evals/scenarios \
            --artifact-root build/evals/scheduled \
            --mode live \
            --model-adapter github_models \
            --model-id openai/gpt-4.1-mini \
            --seed 0 \
            --max-scenarios 6 \
            --inspect-model mockllm/model \
            --log-dir build/evals/scheduled/inspect-logs
      - name: Replay scheduled live bundles
        if: steps.live-secret.outputs.configured == 'true'
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals replay-artifacts \
            build/evals/scheduled \
            --replay-artifact-root build/evals/scheduled-replay
      - name: Audit scheduled eval artifacts for redaction leaks
        if: steps.live-secret.outputs.configured == 'true'
        env:
          PYTHONPATH: evals
        run: uv run --group eval python -m actionlineage_evals audit-artifacts build/evals
      - name: Generate scheduled trend report
        if: steps.live-secret.outputs.configured == 'true'
        env:
          PYTHONPATH: evals
        run: |
          uv run --group eval python -m actionlineage_evals trend \
            build/evals/scheduled \
            --output build/evals/reports/scheduled-agent-validation-trend.json \
            --markdown-output build/evals/reports/scheduled-agent-validation-trend.md \
            --label scheduled-github-models
      - name: Summarize scheduled eval artifacts
        if: always() && steps.live-secret.outputs.configured == 'true'
        env:
          PYTHONPATH: evals
        run: |
          {
            echo "### Scheduled Agent Validation Lab scorecards"
            echo
            uv run --group eval python -m actionlineage_evals summarize build/evals --format markdown || true
            echo
            cat build/evals/reports/scheduled-agent-validation-trend.md 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload scheduled eval artifacts
        if: always() && steps.live-secret.outputs.configured == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: actionlineage-agent-validation-scheduled
          path: build/evals
          if-no-files-found: ignore
          retention-days: 14
