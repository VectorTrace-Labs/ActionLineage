name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Package index publishing target"
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "testpypi"
          - "pypi"

permissions:
  contents: read

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Sync
        run: uv sync --locked --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy src
      - name: Test
        run: uv run pytest
      - name: Claim-language guard
        run: uv run python scripts/check_claims_language.py .
      - name: Secret scan
        run: uv run python scripts/secret_scan.py .
      - name: Dependency audit
        run: uv run pip-audit

  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Sync
        run: uv sync --locked --all-extras
      - name: Build wheel and source distribution
        run: uv build --out-dir dist
      - name: Generate SBOM
        run: uv run python scripts/generate_sbom.py --output build/release/actionlineage-sbom.json
      - name: Generate local release provenance
        run: |
          uv run python scripts/generate_release_provenance.py \
            --dist-dir dist \
            --output build/release/actionlineage-provenance.json
      - name: Generate checksums
        run: sha256sum dist/* build/release/* > build/release/SHA256SUMS.txt
      - name: Upload release artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: actionlineage-release-artifacts
          path: |
            dist/*
            build/release/*
          if-no-files-found: error

  attest:
    name: Attest release artifacts
    runs-on: ubuntu-latest
    needs: build
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: actionlineage-release-artifacts
          path: release-artifacts
      - name: Generate artifact attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: "release-artifacts/**"

  publish-ghcr:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Compute container image metadata
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version="${GITHUB_REF_NAME#v}"
          image="ghcr.io/${owner}/actionlineage"
          {
            echo "image=${image}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build container image
        run: |
          docker build \
            -f deploy/docker/Dockerfile \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.version="${{ steps.image.outputs.version }}" \
            --label org.opencontainers.image.created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -t "${{ steps.image.outputs.image }}:${GITHUB_REF_NAME}" \
            -t "${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}" \
            .
      - name: Smoke test container image
        run: |
          docker run --rm "${{ steps.image.outputs.image }}:${GITHUB_REF_NAME}" version
          docker run --rm "${{ steps.image.outputs.image }}:${GITHUB_REF_NAME}" doctor
      - name: Push container image
        run: |
          docker push "${{ steps.image.outputs.image }}:${GITHUB_REF_NAME}"
          docker push "${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}"

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: attest
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: testpypi
      url: https://test.pypi.org/project/actionlineage/
    permissions:
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: actionlineage-release-artifacts
          path: release-artifacts
      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: release-artifacts/dist
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: attest
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'pypi' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/actionlineage/
    permissions:
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: actionlineage-release-artifacts
          path: release-artifacts
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: release-artifacts/dist
