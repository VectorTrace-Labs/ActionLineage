      - artifact_redaction_audit

  - id: AVL-012
    name: concurrent-run-isolation
    maturity: development-only
    first_slice: false
    agent_task: preserve run attribution for two interleaved child agent runs
    expected_failure_class_on_mismatch: product_failure
    required_oracles:
      - filesystem_state
      - process_status
      - receiver_log
      - sqlite_readback
      - journal_verification
      - projection_rebuild
      - contract_validation
      - redaction_scan
