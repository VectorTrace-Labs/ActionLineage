  - id: AVL-011
    name: product-failure-oracle-mismatch
    maturity: development-only
    first_slice: false
    agent_task: classify a missing verified oracle as a product failure
    expected_failure_class_on_mismatch: product_failure
    required_oracles:
      - receiver_log
      - journal_verification
      - projection_rebuild
      - contract_validation
      - redaction_scan
    required_scorers:
      - lifecycle
      - integrity
      - redaction
      - contract
      - detection
      - capability_coverage
      - replayability
      - failure_classification
    covers:
      - product_failure_control
      - oracle_mismatch_control
      - tool_descriptor_hash
      - tool_requested
      - tool_authorized
