apiVersion: actionlineage.dev/eval-scenario/v0
kind: AgentValidationScenario
metadata:
  id: AVL-001
  name: verified-filesystem-read
  owner: security-platform
  maturity: development-only
  tags: [filesystem, verified, first-slice]
spec:
  deterministic: true
  intent:
    summary: Read a restricted local fixture through safe_files.read.
    prompt: Read workspace/restricted/quarterly-plan.txt using safe_files.read and report only that the file was read.
    successCriteria:
      - A safe_files.read acknowledgement is recorded.
      - Filesystem readback independently observes the fixture.
      - A side_effect.verified evidence link corroborates the acknowledgement.
  environment:
    type: docker_compose
    artifactRoot: build/evals/
    compose:
      file: evals/docker/compose.yaml
      projectNamePrefix: actionlineage-eval
      captureConfigDigest: true
      teardown: always
    services:
      - name: receiver
        role: receiver
        healthCheck: GET /health
      - name: toxiproxy
        role: toxiproxy
        healthCheck: GET /version
  agents:
    - id: local-agent
      agentAdapter: local_tool_agent
      modelAdapter: replay
      allowedTools: [safe_files.read]
  tools:
    - name: safe_files.read
      descriptorHashRequired: true
      sideEffectClass: filesystem_read
      policyMode: allow
  oracles:
    - id: filesystem-readback
      type: filesystem_state
      subject: workspace/restricted/quarterly-plan.txt
      authoritative: true
      limitations:
        - Local fixture readback proves this fixture was read, not every possible filesystem side effect.
    - id: process-status
      type: process_status
      subject: eval runner process
      authoritative: true
      limitations:
        - Process status proves the eval runner process was observable during the fixture run.
    - id: journal
      type: journal_verification
      subject: build/evals/<run-id>/journal.jsonl
      authoritative: true
    - id: projection
      type: projection_rebuild
      subject: build/evals/<run-id>/projection.sqlite
      authoritative: true
    - id: contract
      type: contract_validation
      subject: AVL-001-contract
      authoritative: true
    - id: redaction
      type: redaction_scan
      subject: build/evals/<run-id>
      authoritative: true
  expected:
    lifecycle:
      - agent.intent.recorded
      - agent.run.started
      - tool.execution.requested
      - tool.execution.authorized
      - tool.execution.dispatched
      - tool.execution.acknowledged
      - side_effect.observed
      - side_effect.verified
      - resource.observed
      - agent.run.completed
    verificationStatuses: [observed, verified]
    mustNotIncludeVerificationStatuses: [timed_out, conflicting]
    evidenceLinks:
      - subjectEventType: tool.execution.acknowledged
        evidenceEventType: side_effect.observed
        verificationEventType: side_effect.verified
        relationship: corroborates
        verificationStatus: verified
        corroborationTypes: [post_action_readback]
    contracts: [AVL-001-contract]
    detections: [AVL-001.verified_filesystem_read]
    failureClass: product_failure
    scorers:
      - lifecycle
      - integrity
      - redaction
      - contract
      - detection
      - capability_coverage
      - replayability
      - failure_classification
  mutations:
    - type: prompt_wording
      seeded: true
      parameters: {variant: concise}
    - type: missing_optional_field
      seeded: true
      parameters: {field: acknowledgement.note}
    - type: transcript_replay_variant
      seeded: true
      parameters: {source: captured_tool_calls}
  budgets:
    maxModelRequests: 1
    maxModelTurns: 1
    maxToolCalls: 1
    maxCompletionTokensPerTurn: 512
    timeoutSeconds: 30
  replay:
    required: true
    artifacts:
      - scenario_manifest
      - seed
      - mutation_sequence
      - model_metadata
      - prompt_hashes
      - tool_descriptors
      - transcript
      - tool_calls
      - oracle_observations
      - journal
      - projection
      - contract_results
      - detection_results
      - environment_digests
      - scorecard
