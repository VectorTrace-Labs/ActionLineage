apiVersion: actionlineage.dev/eval-scenario/v0
kind: AgentValidationScenario
metadata:
  id: AVL-008
  name: budget-exhausted-control
  owner: security-platform
  maturity: development-only
  tags: [budget, failure-classification, replay]
spec:
  deterministic: true
  intent:
    summary: Classify model-request budget exhaustion as inconclusive.
    prompt: Trigger the synthetic budget-exhaustion control before any model request is allowed.
    successCriteria:
      - The run records intent, start, and failed lifecycle evidence.
      - The scorecard classifies the terminal condition as inconclusive_budget_exhausted.
      - No tool call or side effect is invented after budget exhaustion.
  environment:
    type: docker_compose
    artifactRoot: build/evals/
    compose:
      file: evals/docker/compose.yaml
      projectNamePrefix: actionlineage-eval
      captureConfigDigest: true
      teardown: always
    services:
      - name: fixture
        role: fixture
        healthCheck: fixture-only
  agents:
    - id: local-agent
      agentAdapter: local_tool_agent
      modelAdapter: replay
      allowedTools: [budget.synthetic_exhaustion]
  tools:
    - name: budget.synthetic_exhaustion
      descriptorHashRequired: false
      sideEffectClass: none
      policyMode: not_applicable
  oracles:
    - id: journal
      type: journal_verification
      subject: build/evals/<run-id>/journal.jsonl
      authoritative: true
    - id: projection
      type: projection_rebuild
      subject: build/evals/<run-id>/projection.sqlite
      authoritative: true
    - id: redaction
      type: redaction_scan
      subject: build/evals/<run-id>
      authoritative: true
  expected:
    lifecycle:
      - agent.intent.recorded
      - agent.run.started
      - agent.run.failed
    verificationStatuses: []
    mustNotIncludeVerificationStatuses: [observed, verified, unverified, timed_out, conflicting]
    evidenceLinks: []
    contracts: [AVL-008-contract]
    detections: []
    failureClass: inconclusive_budget_exhausted
    scorers:
      - lifecycle
      - integrity
      - redaction
      - contract
      - detection
      - capability_coverage
      - replayability
      - failure_classification
  mutations:
    - type: transcript_replay_variant
      seeded: true
      parameters: {source: budget_exhausted}
  budgets:
    maxModelRequests: 0
    maxModelTurns: 1
    maxToolCalls: 0
    maxCompletionTokensPerTurn: 1
    timeoutSeconds: 10
  replay:
    required: true
    artifacts:
      - scenario_manifest
      - seed
      - mutation_sequence
      - model_metadata
      - prompt_hashes
      - transcript
      - tool_calls
      - oracle_observations
      - journal
      - projection
      - contract_results
      - detection_results
      - environment_digests
      - scorecard
