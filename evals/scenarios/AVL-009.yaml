apiVersion: actionlineage.dev/eval-scenario/v0
kind: AgentValidationScenario
metadata:
  id: AVL-009
  name: harness-failure-control
  owner: security-platform
  maturity: development-only
  tags: [harness, failure-classification, replay]
spec:
  deterministic: true
  intent:
    summary: Classify a deterministic harness oracle failure separately from product failures.
    prompt: Trigger the synthetic harness-control path after the run starts and before any tool is dispatched.
    successCriteria:
      - The run records intent, start, and failed lifecycle evidence.
      - The scorecard classifies the terminal condition as harness_failure.
      - No product failure or provider failure is reported for this harness-control case.
  environment:
    type: docker_compose
    artifactRoot: build/evals/
    compose:
      file: evals/docker/compose.yaml
      projectNamePrefix: actionlineage-eval
      captureConfigDigest: true
      teardown: always
    services:
      - name: fixture
        role: fixture
        healthCheck: fixture-only
  agents:
    - id: local-agent
      agentAdapter: local_tool_agent
      modelAdapter: replay
      allowedTools: [harness.synthetic_oracle_failure]
  tools:
    - name: harness.synthetic_oracle_failure
      descriptorHashRequired: false
      sideEffectClass: none
      policyMode: not_applicable
  oracles:
    - id: journal
      type: journal_verification
      subject: build/evals/<run-id>/journal.jsonl
      authoritative: true
    - id: projection
      type: projection_rebuild
      subject: build/evals/<run-id>/projection.sqlite
      authoritative: true
    - id: redaction
      type: redaction_scan
      subject: build/evals/<run-id>
      authoritative: true
  expected:
    lifecycle:
      - agent.intent.recorded
      - agent.run.started
      - agent.run.failed
    verificationStatuses: []
    mustNotIncludeVerificationStatuses: [observed, verified, unverified, timed_out, conflicting]
    evidenceLinks: []
    contracts: [AVL-009-contract]
    detections: []
    failureClass: harness_failure
    scorers:
      - lifecycle
      - integrity
      - redaction
      - contract
      - detection
      - capability_coverage
      - replayability
      - failure_classification
  mutations:
    - type: transcript_replay_variant
      seeded: true
      parameters: {source: harness_failure}
  budgets:
    maxModelRequests: 1
    maxModelTurns: 1
    maxToolCalls: 0
    maxCompletionTokensPerTurn: 32
    timeoutSeconds: 10
  replay:
    required: true
    artifacts:
      - scenario_manifest
      - seed
      - mutation_sequence
      - model_metadata
      - prompt_hashes
      - transcript
      - tool_calls
      - oracle_observations
      - journal
      - projection
      - contract_results
      - detection_results
      - environment_digests
      - scorecard
