apiVersion: actionlineage.dev/eval-scenario/v0
kind: AgentValidationScenario
metadata:
  id: AVL-015
  name: service-mode-auth-boundary
  owner: security-platform
  maturity: development-only
  tags: [service, auth, rbac, redaction, replay]
spec:
  deterministic: true
  intent:
    summary: Verify optional service-mode auth decisions stay observable and redacted.
    prompt: Attempt to read /events through service_api.read first without valid authorization, then with the synthetic read token.
    successCriteria:
      - The invalid synthetic token is denied before dispatch.
      - The valid synthetic read token authorizes a metadata-only service read.
      - Raw token values are absent from journals, transcripts, replay bundles, and logs.
      - Service authorization evidence comes from the service auth oracle, not from agent self-report.
      - Replay preserves the denied-then-allowed authorization boundary without model calls.
  environment:
    type: docker_compose
    artifactRoot: build/evals/
    compose:
      file: evals/docker/compose.yaml
      projectNamePrefix: actionlineage-eval
      captureConfigDigest: true
      teardown: always
    services:
      - name: fixture
        role: fixture
        healthCheck: fixture-only
  agents:
    - id: local-agent
      agentAdapter: local_tool_agent
      modelAdapter: replay
      allowedTools: [service_api.read]
  tools:
    - name: service_api.read
      descriptorHashRequired: true
      sideEffectClass: service_read
      policyMode: require_approval
  oracles:
    - id: service-authz
      type: service_authz
      subject: static-token service auth fixture
      authoritative: true
      limitations:
        - Uses ActionLineage service auth helpers with synthetic static tokens; it does not start a production service.
    - id: downstream-count
      type: downstream_call_count
      subject: service_api.read dispatch count
      authoritative: true
    - id: journal
      type: journal_verification
      subject: build/evals/<run-id>/journal.jsonl
      authoritative: true
    - id: projection
      type: projection_rebuild
      subject: build/evals/<run-id>/projection.sqlite
      authoritative: true
    - id: contract
      type: contract_validation
      subject: AVL-015-contract
      authoritative: true
    - id: detection
      type: detection_matches
      subject: AVL-015.service_auth_denied_then_allowed
      authoritative: true
    - id: redaction
      type: redaction_scan
      subject: build/evals/<run-id>
      authoritative: true
  expected:
    lifecycle:
      - agent.intent.recorded
      - agent.run.started
      - tool.execution.requested
      - policy.decision
      - tool.execution.not_dispatched
      - tool.execution.authorized
      - tool.execution.dispatched
      - tool.execution.acknowledged
      - resource.observed
      - side_effect.verified
      - agent.run.completed
    verificationStatuses: [observed, verified, unverified]
    mustNotIncludeVerificationStatuses: [timed_out, conflicting]
    evidenceLinks:
      - subjectEventType: tool.execution.acknowledged
        evidenceEventType: resource.observed
        verificationEventType: side_effect.verified
        relationship: corroborates
        verificationStatus: verified
        corroborationTypes: [fixture_oracle]
    contracts: [AVL-015-contract]
    detections: [AVL-015.service_auth_denied_then_allowed]
    redactionCanaries:
      - id: service-token
        artifactScopes: [journal, projection, transcript, inspect_logs, errors]
    failureClass: product_failure
    scorers:
      - lifecycle
      - integrity
      - redaction
      - contract
      - detection
      - capability_coverage
      - replayability
      - failure_classification
  mutations: []
  budgets:
    maxModelRequests: 1
    maxModelTurns: 1
    maxToolCalls: 2
    maxCompletionTokensPerTurn: 512
    timeoutSeconds: 30
  replay:
    required: true
    artifacts:
      - scenario_manifest
      - seed
      - mutation_sequence
      - model_metadata
      - prompt_hashes
      - tool_descriptors
      - transcript
      - tool_calls
      - oracle_observations
      - journal
      - projection
      - contract_results
      - detection_results
      - environment_digests
      - scorecard
      - provenance
      - replay_equivalence
