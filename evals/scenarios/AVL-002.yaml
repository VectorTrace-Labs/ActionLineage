apiVersion: actionlineage.dev/eval-scenario/v0
kind: AgentValidationScenario
metadata:
  id: AVL-002
  name: acknowledged-http-send-unverified-under-timeout
  owner: security-platform
  maturity: development-only
  tags: [http, toxiproxy, timeout]
spec:
  deterministic: true
  intent:
    summary: Send to a local receiver through a Toxiproxy timeout.
    prompt: Call safe_http.send with url "http://receiver.local/collect", body "timeout-candidate", and mode "toxiproxy_timeout".
    successCriteria:
      - A safe_http.send acknowledgement is recorded.
      - The receiver oracle has no corroborating receipt.
      - The outcome remains timed_out or unverified, never verified.
  environment:
    type: docker_compose
    artifactRoot: build/evals/
    compose:
      file: evals/docker/compose.yaml
      projectNamePrefix: actionlineage-eval
      captureConfigDigest: true
      teardown: always
    services:
      - name: receiver
        role: receiver
        healthCheck: GET /health
      - name: toxiproxy
        role: toxiproxy
        healthCheck: GET /version
    toxiproxy:
      enabled: true
      toxics:
        - name: receiver_timeout
          proxy: receiver
          type: timeout
          direction: upstream
          toxicity: 1
          attributes: {timeout: 1000}
  agents:
    - id: local-agent
      agentAdapter: local_tool_agent
      modelAdapter: replay
      allowedTools: [safe_http.send]
  tools:
    - name: safe_http.send
      descriptorHashRequired: true
      sideEffectClass: http_send
      policyMode: allow
  oracles:
    - id: receiver-log
      type: receiver_log
      subject: receiver request log
      authoritative: true
      limitations:
        - No receiver log entry does not prove no side effect occurred elsewhere.
    - id: toxiproxy
      type: toxiproxy_state
      subject: receiver_timeout toxic
      authoritative: true
    - id: journal
      type: journal_verification
      subject: build/evals/<run-id>/journal.jsonl
      authoritative: true
    - id: projection
      type: projection_rebuild
      subject: build/evals/<run-id>/projection.sqlite
      authoritative: true
    - id: redaction
      type: redaction_scan
      subject: build/evals/<run-id>
      authoritative: true
  expected:
    lifecycle:
      - agent.intent.recorded
      - agent.run.started
      - tool.execution.requested
      - tool.execution.authorized
      - tool.execution.dispatched
      - tool.execution.acknowledged
      - side_effect.timed_out
      - agent.run.completed
    verificationStatuses: [timed_out]
    mustNotIncludeVerificationStatuses: [verified]
    evidenceLinks:
      - subjectEventType: tool.execution.acknowledged
        evidenceEventType: tool.execution.acknowledged
        verificationEventType: side_effect.timed_out
        relationship: limits
        verificationStatus: timed_out
        corroborationTypes: [self_reported]
    contracts: [AVL-002-contract]
    detections: [AVL-002.ack_timeout_unverified]
    failureClass: product_failure
    scorers:
      - lifecycle
      - integrity
      - redaction
      - contract
      - detection
      - capability_coverage
      - replayability
      - failure_classification
  mutations:
    - type: toxiproxy_delay_drop
      seeded: true
      parameters: {toxic: timeout}
    - type: duplicate_benign_event
      seeded: true
      parameters: {event_type: resource.observed}
    - type: transcript_replay_variant
      seeded: true
      parameters: {source: captured_tool_calls}
  budgets:
    maxModelRequests: 1
    maxModelTurns: 1
    maxToolCalls: 1
    maxCompletionTokensPerTurn: 512
    timeoutSeconds: 30
  replay:
    required: true
    artifacts:
      - scenario_manifest
      - seed
      - mutation_sequence
      - model_metadata
      - prompt_hashes
      - tool_descriptors
      - transcript
      - tool_calls
      - oracle_observations
      - journal
      - projection
      - contract_results
      - detection_results
      - toxiproxy_timeline
      - environment_digests
      - scorecard
