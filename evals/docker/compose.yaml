services:
  receiver:
    image: python:3.13-alpine
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 128m
    command:
      - python
      - /app/receiver.py
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --log
      - /artifacts/receiver/requests.jsonl
    ports:
      - "8080"
    networks:
      - eval-net
    tmpfs:
      - /tmp
    volumes:
      - ./receiver.py:/app/receiver.py:ro
      - receiver-artifacts:/artifacts
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"
      interval: 2s
      timeout: 3s
      retries: 20

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 128m
    command:
      - -host=0.0.0.0
    ports:
      - "8474"
      - "8880"
    networks:
      - eval-net
    tmpfs:
      - /tmp

volumes:
  receiver-artifacts:

networks:
  eval-net:
    driver: bridge
